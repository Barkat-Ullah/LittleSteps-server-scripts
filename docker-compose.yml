services:
  # ─────────────────────────────────────────
  # Node.js App
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: littlesteps-app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IS_WORKER: "false"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - littlesteps-network
  # ─────────────────────────────────────────
  # Node.js Worker
  # ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: littlesteps-worker
    restart: unless-stopped

    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IS_WORKER: "true"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - littlesteps-network
  # ─────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: littlesteps-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - littlesteps-network

  # ─────────────────────────────────────────
  # Redis (BullMQ + Cache)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: littlesteps-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass $$REDIS_PASSWORD
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - littlesteps-network

# ─────────────────────────────────────────
# Volumes & Network
# ─────────────────────────────────────────
volumes:
  mongo_data:
  redis_data:

networks:
  littlesteps-network:
    driver: bridge
